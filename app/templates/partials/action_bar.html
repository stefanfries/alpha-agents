<div class="d-flex align-items-center gap-3 mt-4 pt-3 border-top">
  <form method="post" action="/quant-systems/{{ qs_id }}/executions/{{ execution.execution_id }}/stages/{{ current_stage }}/approve">
    {% block approve_extras %}{% endblock %}
    <button type="submit" class="btn btn-success">
      {% block approve_label %}Approve →{% endblock %}
    </button>
  </form>

  <div class="ms-auto d-flex align-items-center gap-2">
    <label class="text-muted small mb-0">Restart from:</label>
    <form method="post" action="/quant-systems/{{ qs_id }}/executions/{{ execution.execution_id }}/stages/{{ current_stage }}/restart"
          id="restart-form">
      <select name="from_stage" class="form-select form-select-sm"
              style="width: auto;">
        {% for s in stages %}
          {% if loop.index0 <= stages.index(current_stage) %}
          <option value="{{ s }}">{{ stage_labels[s] }}</option>
          {% endif %}
        {% endfor %}
      </select>
      <button type="submit" class="btn btn-sm btn-outline-secondary">Restart</button>
    </form>
  </div>
</div>
