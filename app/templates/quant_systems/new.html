{% extends "base.html" %}
{% block title %}New Quant System — Alpha Agents{% endblock %}

{% block content %}
<div class="container py-4" style="max-width:680px">
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/quant-systems">Quant Systems</a></li>
      <li class="breadcrumb-item active">New</li>
    </ol>
  </nav>
  <h4 class="mb-4">New Quant System</h4>

  <form method="post" action="/quant-systems">
    <!-- Name -->
    <div class="mb-3">
      <label class="form-label fw-semibold">Name</label>
      <input type="text" class="form-control" name="name" required placeholder="e.g. DAX Trend Strategy">
    </div>

    <!-- Indices -->
    <div class="mb-3">
      <label class="form-label fw-semibold">Indices</label>
      <div class="d-flex flex-wrap gap-3">
        {% for idx in indices %}
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="indices" value="{{ idx }}"
                 id="idx-{{ idx }}" {% if idx == "DAX" %}checked{% endif %}>
          <label class="form-check-label" for="idx-{{ idx }}">{{ idx }}</label>
        </div>
        {% endfor %}
      </div>
    </div>

    <!-- Capital -->
    <div class="mb-3">
      <label class="form-label fw-semibold">Capital (EUR)</label>
      <input type="number" class="form-control" name="capital_eur" value="100000" step="1000" min="1000">
    </div>

    <!-- Depot picker -->
    <div class="mb-3">
      <label class="form-label fw-semibold">Depot</label>
      <select class="form-select" name="depot_id" id="depot-select" required
              onchange="document.getElementById('depot_type').value = this.selectedOptions[0].dataset.type || ''">
        <option value="" disabled selected>— choose a depot —</option>
        {% if real_depots %}
        <optgroup label="Real depots (Comdirect)">
          {% for d in real_depots %}
          <option value="{{ d.depot_id }}" data-type="real">
            {{ d.display_name or d.account_name }} ({{ d.depot_id }})
          </option>
          {% endfor %}
        </optgroup>
        {% endif %}
        {% if virtual_depots %}
        <optgroup label="Virtual depots (paper trading)" id="virtual-optgroup">
          {% include "quant_systems/partials/virtual_depot_options.html" %}
        </optgroup>
        {% else %}
        <optgroup label="Virtual depots (paper trading)" id="virtual-optgroup"></optgroup>
        {% endif %}
      </select>
      <input type="hidden" name="depot_type" id="depot_type" value="">
    </div>

    <!-- Inline: create virtual depot -->
    <div class="mb-4">
      <button type="button" class="btn btn-sm btn-outline-secondary"
              data-bs-toggle="collapse" data-bs-target="#new-virtual-depot">
        + Create virtual depot
      </button>
      <div class="collapse mt-2" id="new-virtual-depot">
        <div class="card card-body">
          <div class="row g-2 align-items-end">
            <div class="col-sm-6">
              <label class="form-label small">Depot name</label>
              <input type="text" class="form-control form-control-sm" id="vd-name" placeholder="My Paper Depot">
            </div>
            <div class="col-sm-4">
              <label class="form-label small">Starting capital (EUR)</label>
              <input type="number" class="form-control form-control-sm" id="vd-capital" value="100000" step="1000" min="1000">
            </div>
            <div class="col-sm-2">
              <button type="button" class="btn btn-sm btn-primary w-100"
                      hx-post="/quant-systems/depots/virtual"
                      hx-include="#vd-name,#vd-capital"
                      hx-vals='{"name": "", "starting_capital": ""}'
                      hx-target="#virtual-optgroup"
                      hx-swap="innerHTML"
                      onclick="this.closest('form').querySelector('[name=depot_type]').value='virtual'"
                      _="on htmx:configRequest
                           set event.detail.parameters['name'] to #vd-name.value
                           set event.detail.parameters['starting_capital'] to #vd-capital.value">
                Create
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-success">Create Quant System</button>
      <a href="/quant-systems" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Sync depot_type hidden field when select changes
  document.getElementById('depot-select').addEventListener('change', function() {
    var opt = this.selectedOptions[0];
    document.getElementById('depot_type').value = opt.dataset.type || '';
  });
  // After HTMX swaps in new virtual depot options, set depot_type
  document.body.addEventListener('htmx:afterSwap', function(evt) {
    if (evt.detail.target.id === 'virtual-optgroup') {
      var sel = document.getElementById('depot-select');
      // Select the last option (newly created)
      var opts = sel.querySelectorAll('option');
      if (opts.length > 0) {
        var last = opts[opts.length - 1];
        last.selected = true;
        document.getElementById('depot_type').value = 'virtual';
      }
    }
  });
</script>
{% endblock %}
