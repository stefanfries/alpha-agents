<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Alpha Agents{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    .sidebar { min-height: calc(100vh - 56px); border-right: 1px solid var(--bs-border-color); }
    .stage-link { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 6px; text-decoration: none; color: var(--bs-secondary-color); font-size: .9rem; }
    .stage-link:hover { background: var(--bs-tertiary-bg); color: var(--bs-body-color); }
    .stage-link.active { background: hsl(215, 100%, 6%); color: hsl(216, 87%, 65%); font-weight: 600; }
    .stage-link .badge { font-size: .7rem; }
    #chart-panel { min-height: 200px; }
    .content-col { height: calc(100vh - 56px); display: flex; flex-direction: column; }

    [data-bs-theme="dark"] body { background: #000; }
    [data-bs-theme="dark"] .sidebar { background: #0a0a0a; border-right-color: hsl(0, 0%, 20%); }
    [data-bs-theme="dark"] .stage-link { color: hsl(0, 0%, 70%); }
    [data-bs-theme="dark"] .stage-link:hover { background: hsl(0, 0%, 12%); color: hsl(0, 0%, 99%); }
    [data-bs-theme="dark"] .stage-link.active { background: hsl(215, 100%, 6%); color: hsl(216, 87%, 65%); }

    [data-bs-theme="light"] body { background: #f8f9fa; }
    [data-bs-theme="light"] .sidebar { background: #fff; border-right-color: #dee2e6; }
    [data-bs-theme="light"] .stage-link { color: #495057; }
    [data-bs-theme="light"] .stage-link:hover { background: #f0f0f0; color: #212529; }
    [data-bs-theme="light"] .stage-link.active { background: #e7f1ff; color: #0d6efd; }
  </style>
  <script>
    (function() {
      var saved = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-bs-theme', saved);
    })();
  </script>
  <script>
    function initDataCharts(container) {
      var el = container.querySelector('[data-chart]');
      if (!el) return;
      var d = JSON.parse(el.getAttribute('data-chart'));
      var isDark = document.documentElement.getAttribute('data-bs-theme') === 'dark';
      var bg        = isDark ? '#111111' : '#ffffff';
      var textColor = isDark ? '#9B9B9B' : '#555555';
      var gridColor = isDark ? 'rgba(255,255,255,.05)' : 'rgba(0,0,0,.05)';

      var baseOpts = {
        autoSize: true,
        layout: { background: { type: 'solid', color: bg }, textColor: textColor },
        grid: { vertLines: { color: gridColor }, horzLines: { color: gridColor } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        rightPriceScale: { borderColor: gridColor },
        timeScale: { borderColor: gridColor, fixLeftEdge: true, fixRightEdge: true },
      };

      // Price chart
      var priceEl = container.querySelector('.lw-price');
      var chart = LightweightCharts.createChart(priceEl, baseOpts);

      var candles = chart.addCandlestickSeries({
        upColor: '#26a69a', downColor: '#ef5350',
        borderVisible: false,
        wickUpColor: '#26a69a', wickDownColor: '#ef5350',
      });
      candles.setData(d.ohlcv);

      var overlays = {
        ema20:  chart.addLineSeries({ color: '#2196F3', lineWidth: 1, priceLineVisible: false, lastValueVisible: false }),
        ema50:  chart.addLineSeries({ color: '#FF9800', lineWidth: 1, priceLineVisible: false, lastValueVisible: false }),
        sma200: chart.addLineSeries({ color: '#9C27B0', lineWidth: 1, priceLineVisible: false, lastValueVisible: false }),
      };
      overlays.ema20.setData(d.ema20);
      overlays.ema50.setData(d.ema50);   overlays.ema50.applyOptions({ visible: false });
      overlays.sma200.setData(d.sma200); overlays.sma200.applyOptions({ visible: false });

      // Strike price line (warrant charts)
      if (d.strike != null) {
        candles.createPriceLine({
          price: d.strike,
          color: '#FF9800',
          lineWidth: 1,
          lineStyle: LightweightCharts.LineStyle.Dashed,
          axisLabelVisible: true,
          title: 'Strike',
        });
      }
      // Maturity date marker (warrant charts)
      if (d.maturity) {
        var maturityMarkers = [{ time: d.maturity, position: 'aboveBar', color: '#FF9800', shape: 'arrowDown', text: 'Expiry' }];
        candles.setMarkers(maturityMarkers);
      }

      // SuperTrend: one LineSeries per contiguous segment so lines never bridge across trend flips
      var stGroup = [];
      (function() {
        if (!d.supertrend || !d.supertrend.length) return;
        var segs = [];
        d.supertrend.forEach(function(p) {
          if (!segs.length || segs[segs.length - 1].bull !== p.bull)
            segs.push({ bull: p.bull, data: [] });
          segs[segs.length - 1].data.push({ time: p.time, value: p.value });
        });
        segs.forEach(function(seg) {
          var s = chart.addLineSeries({
            color: seg.bull ? '#26a69a' : '#ef5350',
            lineWidth: 2, priceLineVisible: false, lastValueVisible: false,
          });
          s.setData(seg.data);
          s.applyOptions({ visible: false });
          stGroup.push(s);
        });
      })();

      // ADX chart (synchronized, hidden by default) — only when .lw-adx element exists
      var adxEl = container.querySelector('.lw-adx');
      var adxChart = null;
      if (adxEl) {
        adxChart = LightweightCharts.createChart(adxEl, Object.assign({}, baseOpts, {
          timeScale: Object.assign({}, baseOpts.timeScale, { visible: false }),
        }));
        // Anchor the ADX chart's bar-index mapping to the full OHLCV range so that
        // setVisibleLogicalRange syncs to identical timestamps in both charts.
        var _adxAnchor = adxChart.addLineSeries({ priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false });
        _adxAnchor.setData(d.ohlcv.map(function(p) { return { time: p.time }; }));

        var adxSeries = adxChart.addLineSeries({ color: '#FFD700', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
        adxSeries.setData(d.adx);
        adxSeries.createPriceLine({ price: 25, color: 'rgba(255,255,255,0.25)', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: false });
        adxChart.addLineSeries({ color: '#26a69a', lineWidth: 1, priceLineVisible: false, lastValueVisible: false }).setData(d.plus_di);
        adxChart.addLineSeries({ color: '#ef5350', lineWidth: 1, priceLineVisible: false, lastValueVisible: false }).setData(d.minus_di);

        // Sync time scales
        var _syncing = false;
        chart.timeScale().subscribeVisibleLogicalRangeChange(function(r) {
          if (_syncing || !r) return; _syncing = true; adxChart.timeScale().setVisibleLogicalRange(r); _syncing = false;
        });
        adxChart.timeScale().subscribeVisibleLogicalRangeChange(function(r) {
          if (_syncing || !r) return; _syncing = true; chart.timeScale().setVisibleLogicalRange(r); _syncing = false;
        });
      }

      // Default range: 1 year
      var now = Math.floor(Date.now() / 1000);
      chart.timeScale().setVisibleRange({ from: now - 365 * 86400, to: now });

      // Time range buttons
      container.querySelectorAll('[data-range]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          container.querySelectorAll('[data-range]').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          var days = { '3M': 90, '6M': 180, '1Y': 365, '3Y': 1095 }[btn.dataset.range] || 365;
          chart.timeScale().setVisibleRange({ from: now - days * 86400, to: now });
        });
      });

      // Indicator toggle buttons
      container.querySelectorAll('[data-indicator]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          btn.classList.toggle('active');
          var active = btn.classList.contains('active');
          var ind = btn.dataset.indicator;
          if (ind === 'adx') {
            if (adxEl) {
              adxEl.style.display = active ? 'block' : 'none';
              if (active) setTimeout(function() {
                adxChart.timeScale().setVisibleLogicalRange(chart.timeScale().getVisibleLogicalRange());
              }, 10);
            }
          } else if (ind === 'supertrend') {
            stGroup.forEach(function(s) { s.applyOptions({ visible: active }); });
          } else if (overlays[ind]) {
            overlays[ind].applyOptions({ visible: active });
          }
        });
      });
    }

    function loadScreeningChart(runId, ticker, row) {
      row.closest('tbody').querySelectorAll('tr').forEach(function(r) { r.classList.remove('table-active'); });
      row.classList.add('table-active');
      var panel = document.getElementById('chart-panel');
      panel.innerHTML = '<p class="text-muted text-center small mt-4">Loading…</p>';
      fetch('/runs/' + runId + '/charts/screening/' + ticker)
        .then(function(r) { return r.text(); })
        .then(function(html) {
          panel.innerHTML = html;
          initDataCharts(panel);
        })
        .catch(function() {
          panel.innerHTML = '<p class="text-muted text-center small mt-4">Failed to load chart</p>';
        });
    }

    function loadWarrantDetailPanel(runId, sym, row) {
      row.closest('tbody').querySelectorAll('tr').forEach(function(r) { r.classList.remove('table-active'); });
      row.classList.add('table-active');
      var panel = document.getElementById('warrant-detail-panel');
      var chartPanel = document.getElementById('warrant-chart-panel');
      if (chartPanel) chartPanel.innerHTML = '';
      if (!panel) return;
      var top3 = JSON.parse(row.getAttribute('data-top3') || '[]');
      var count = parseInt(row.getAttribute('data-analyzed') || '0', 10);
      if (!top3.length) {
        panel.innerHTML = '<p class="text-muted small mt-2">No warrants found.</p>';
        return;
      }
      var html = '<p class="small text-muted mb-2">' + count + ' warrant' + (count !== 1 ? 's' : '') + ' analyzed — top ' + top3.length + ' shown</p>';
      html += '<table class="table table-sm table-hover mb-0"><thead class="table-light"><tr>';
      html += '<th>WKN</th><th>ISIN</th><th class="text-end">Strike</th><th>Maturity</th>';
      html += '<th class="text-end">Spread</th><th class="text-end">Lev</th><th class="text-end">Delta</th><th class="text-end">Score</th></tr></thead><tbody>';
      top3.forEach(function(w, i) {
        var strike = w.strike != null ? w.strike.toFixed(2) : '—';
        var maturity = w.maturity_date || '—';
        var spread = w.spread_pct != null ? w.spread_pct.toFixed(1) + '%' : '—';
        var lev = w.leverage != null ? w.leverage.toFixed(1) + '×' : '—';
        var delta = w.delta != null ? w.delta.toFixed(2) : '—';
        var score = w.score != null ? w.score.toFixed(2) : '—';
        html += '<tr style="cursor:pointer" onclick="loadWarrantChart(\'' + runId + '\',\'' + sym + '\',' + (w.strike || 'null') + ',\'' + (w.maturity_date || '') + '\',this)">';
        html += '<td><code>' + (w.warrant_wkn || '—') + '</code></td>';
        html += '<td class="small text-muted">' + (w.warrant_isin || '—') + '</td>';
        html += '<td class="text-end small">' + strike + '</td>';
        html += '<td class="small">' + maturity + '</td>';
        html += '<td class="text-end small">' + spread + '</td>';
        html += '<td class="text-end small">' + lev + '</td>';
        html += '<td class="text-end small">' + delta + '</td>';
        html += '<td class="text-end fw-semibold">' + score + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
      panel.innerHTML = html;
    }

    function loadWarrantChart(runId, ticker, strike, maturity, row) {
      if (row) {
        row.closest('tbody').querySelectorAll('tr').forEach(function(r) { r.classList.remove('table-active'); });
        row.classList.add('table-active');
      }
      var chartPanel = document.getElementById('warrant-chart-panel');
      if (!chartPanel) return;
      chartPanel.innerHTML = '<p class="text-muted text-center small mt-2">Loading…</p>';
      var url = '/runs/' + runId + '/charts/warrant_selection/' + ticker;
      var params = [];
      if (strike != null) params.push('strike=' + strike);
      if (maturity) params.push('maturity=' + maturity);
      if (params.length) url += '?' + params.join('&');
      fetch(url)
        .then(function(r) { return r.text(); })
        .then(function(html) {
          chartPanel.innerHTML = html;
          initDataCharts(chartPanel);
        })
        .catch(function() {
          chartPanel.innerHTML = '<p class="text-muted text-center small mt-2">Failed to load chart</p>';
        });
    }

    document.addEventListener('htmx:afterSwap', function(evt) {
      initDataCharts(evt.detail.target);
    });
  </script>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
  <a class="navbar-brand fw-bold" href="/runs">⚡ Alpha Agents</a>
  {% if run_id is defined %}
  <span class="text-secondary small">Run <code class="text-light">{{ run_id }}</code></span>
  {% endif %}
  <div class="d-flex align-items-center gap-2">
    <button id="theme-toggle" class="btn btn-sm btn-outline-secondary" title="Toggle light/dark mode" onclick="toggleTheme()">☀</button>
    <a href="/runs" class="btn btn-sm btn-outline-light">All Runs</a>
  </div>
</nav>
<script>
  function toggleTheme() {
    var html = document.documentElement;
    var next = html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-bs-theme', next);
    localStorage.setItem('theme', next);
    document.getElementById('theme-toggle').textContent = next === 'dark' ? '☀' : '🌙';
  }
  document.addEventListener('DOMContentLoaded', function() {
    var theme = document.documentElement.getAttribute('data-bs-theme');
    document.getElementById('theme-toggle').textContent = theme === 'dark' ? '☀' : '🌙';
  });
</script>

<div class="container-fluid">
  <div class="row">

    {% if run is defined %}
    <div class="col-2 sidebar py-3">
      {% include "partials/stage_progress.html" %}
    </div>
    {% endif %}

    <div class="col py-4 px-4 content-col">
      {% block content %}{% endblock %}
    </div>

  </div>
</div>

</body>
</html>
